<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shayantha Das</title>
<script>
  // When someone visits /about /services /projects /contact directly
  // redirect them to index.html and scroll to the right section
  const path = window.location.pathname.replace('/', '').replace('/', '');
  const validSections = ['about', 'services', 'projects', 'contact', 'why', 'process', 'testimonials'];
  if (validSections.includes(path)) {
    sessionStorage.setItem('scrollTo', path);
  }
  window.location.replace('/');
</script>
</head>
<body></body>
</html>
