<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact & Project Intake | Shayantha Das</title>
    <meta name="description" content="Connect with Shayantha Das regarding upcoming technical opportunities, analytics reviews, or data pipeline architecture configurations.">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "mainEntity": {
        "@type": "ProfessionalService",
        "name": "Shayantha Das Analytics",
        "url": "https://yourdomain.com/",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Recruitment Intake Office",
          "email": "your-email@domain.com",
          "availableLanguage": ["English"]
        }
      }
    }
    </script>
</head>
<body>

    <header class="navbar">
        <nav class="nav-container" aria-label="Main Navigation">
            <a href="/" class="logo">SD<span>.</span>analytics</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about/">About & Skills</a></li>
                <li><a href="/projects/">Portfolio Work</a></li>
                <li><a href="/services/">Services</a></li>
                <li><a href="/contact/" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-wrapper" style="text-align: center;">
        <section aria-label="Recruitment Routing Node">
            <h5>Get In Touch</h5>
            <h2>Initiate An Analytical Request</h2>
            <p class="section-subtitle">Submit data role guidelines, platform inquiries, or technical infrastructure audits below.</p>

            <form action="https://formspree.io/f/your-formspree-id" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="recruiter_name">Full Professional Name</label>
                    <input type="text" id="recruiter_name" name="name" class="form-control" placeholder="Jane Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="recruiter_email">Corporate Email Address</label>
                    <input type="email" id="recruiter_email" name="email" class="form-control" placeholder="j.doe@company.com" required>
                </div>

                <div class="form-group">
                    <label for="msg_body">Role Specifications / Project Objectives</label>
                    <textarea id="msg_body" name="message" rows="5" class="form-control" placeholder="Detail your infrastructure timeline or system scope parameter tracking requirements..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="justify-content: center; margin-top: 0.5rem;">Dispatch Message <i class="fas fa-paper-plane"></i></button>
            </form>

            <div style="margin-top: 4rem; display: flex; justify-content: center; gap: 2.5rem; font-size: 1.1rem;">
                <a href="mailto:your-email@domain.com" style="color: var(--text-secondary); text-decoration: none; font-size: 0.95rem; font-weight: 600;"><i class="fas fa-envelope" style="color: var(--neon-cyan); margin-right: 0.5rem;"></i> Direct Email</a>
                <a href="https://github.com/ShayanthaDas" target="_blank" style="color: var(--text-secondary); text-decoration: none; font-size: 0.95rem; font-weight: 600;"><i class="fab fa-github" style="margin-right: 0.5rem;"></i> View Repositories</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Shayantha Das. All Rights Reserved.</p>
    </footer>

</body>
</html>
